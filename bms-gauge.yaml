substitutions:
  name: "bms-gauge"
  # Placeholder only. Auto-discovery (below) finds the nearest ANT BMS by name and
  # sets the real address at runtime, so there is nothing to edit here — leave the
  # all-zero placeholder as-is. (ble_client requires *some* address at config time.)
  bms_mac: "00:00:00:00:00:00"
  # Any BLE device whose advertised name starts with this is treated as our BMS.
  # ANT units advertise as "ANT-BLE<model>-<suffix>", so the prefix matches any pack.
  bms_name_prefix: "ANT-BLE"
  # On-screen overheat warning threshold. BMS itself cuts charge/discharge at
  # 60C, so 50C gives ~10C of "ease off / pull over" headroom before a stranding.
  hot_temp_c: "50"
  # Energy use per mile (Ah/mi) for the range estimate, by riding style. STARTING
  # ESTIMATES ONLY — calibrate after a steady ride: ah_used / miles_ridden.
  # med ~= 40 mph cruise; hard ~= 65 mph (drag scales ~v^2, so 65 is much thirstier).
  # Range shown is raw-to-empty; subtract your own reserve mentally, or lower these.
  range_ah_per_mi_med: "1.1"
  range_ah_per_mi_hard: "1.8"

esphome:
  name: ${name}
  on_boot:
    # Enable the battery-voltage sense path (VBAT_PWR / GPIO17, active-high) so the
    # ADC on GPIO4 can read the gauge's own LiPo. Runs once, early.
    priority: 600
    then:
      - output.turn_on: vbat_power
  # NOTE: the e-paper is deliberately NOT powered at boot. Powering the panel
  # desensitizes this board's onboard BLE antenna (they share one tiny PCB), so
  # we leave the screen dark — image is retained with zero power — until the BMS
  # link is established, then power it only for each refresh. See ble_client +
  # interval below.

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    # Bump the main task stack to dodge the boot-loop the ANT docs warn about.
    # Must be set via sdkconfig — a -DCONFIG_... build flag redefines the symbol
    # already in sdkconfig.h and fails the build under -Werror.
    sdkconfig_options:
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"

# Standalone: no wifi needed to run. Uncomment to enable OTA flashing.
# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password
# ota:
#   - platform: esphome

logger:
  level: INFO
  # BLE + e-paper is chatty; INFO keeps it lean. Bump to DEBUG to see raw frames.

external_components:
  - source: github://syssi/esphome-ant-bms@main

# Tracks whether the BMS BLE link is currently up, so we only ever power the
# e-paper (and refresh it) while connected.
globals:
  - id: bms_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # Best RSSI seen so far during discovery, so we lock onto the NEAREST ANT BMS
  # (useful if more than one pack is in range). Reset on disconnect to re-arm.
  - id: best_rssi
    type: int
    restore_value: no
    initial_value: '-127'
  # Ticks once per LED-driver interval (250ms). Used to derive the blink phase for
  # the green status LED so different battery levels blink at different rates.
  - id: led_tick
    type: int
    restore_value: no
    initial_value: '0'
  # Logical power state, toggled by the PWR button. When the gauge is fed from bike/USB
  # 5V the PWR button can't physically cut VSYS, so this flag carries the "off" state in
  # firmware: it forces the green LED dark. Resets to false on a real (hardware) power-on.
  - id: dev_off
    type: bool
    restore_value: no
    initial_value: 'false'

# ---------------- BLE link to the ANT BMS ----------------
# 100% duty-cycle active scan (window == interval) gives the radio the best
# possible chance of catching this BMS's weak/brief advertisement while the
# panel is dark.
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 160ms
    window: 160ms
  # Auto-discovery: whenever we're not connected, watch every advertisement and
  # point the BLE client at the strongest-signal device whose name starts with
  # the ANT prefix. This is what lets a fresh pack (new MAC) work with no re-flash.
  on_ble_advertise:
    - then:
        - lambda: |-
            if (id(bms_connected)) return;
            std::string n = x.get_name();
            if (n.rfind("${bms_name_prefix}", 0) != 0) return;   // not an ANT BMS
            int r = x.get_rssi();
            if (r > id(best_rssi)) {                              // nearer than any seen
              id(best_rssi) = r;
              id(ant_client).set_address(x.address_uint64());
              ESP_LOGI("autodiscover", "ANT BMS '%s' (%d dBm) -> target %s",
                       n.c_str(), r, x.address_str().c_str());
            }

ble_client:
  - id: ant_client
    # Seed address; overridden at runtime by on_ble_advertise above.
    mac_address: ${bms_mac}
    on_connect:
      then:
        - lambda: 'id(bms_connected) = true;'
    on_disconnect:
      then:
        # Re-arm discovery: clear the flag and reset the RSSI watermark so we can
        # re-acquire the nearest pack (possibly a different one) from scratch.
        - lambda: |-
            id(bms_connected) = false;
            id(best_rssi) = -127;
        # Make sure the panel is off so the radio can re-acquire in clean air.
        - output.turn_off: epd_power

ant_bms_ble:
  - id: bms0
    ble_client_id: ant_client
    update_interval: 10s   # poll fast enough that the screen has fresh data each refresh

# ---------------- e-paper power-enable (GPIO6, ACTIVE-LOW) ----------------
output:
  - platform: gpio
    pin:
      number: GPIO6
      inverted: true   # EPD_PWR is ACTIVE-LOW (Waveshare V2 BSP: gpio 0=ON, 1=OFF)
    id: epd_power
  - platform: gpio
    pin: GPIO17        # BATT_Control — the LiPo power latch (Vbat->VSYS). Held on, it
    id: vbat_power     # keeps the board alive on battery AND enables battery sense;
                       # driving it OFF disconnects the LiPo and powers the board down.
  - platform: gpio
    pin: GPIO3
    inverted: true     # onboard GREEN status LED is active-low (0 = lit)
    id: green_led_pin

# Drive the display only while connected: power the panel, refresh (~1.5s), then
# cut power again. The panel keeps its image with no power, so the BLE radio runs
# in the clear ~27s out of every 30s.
interval:
  - interval: 30s
    then:
      - if:
          condition:
            lambda: 'return id(bms_connected);'
          then:
            - output.turn_on: epd_power     # active-low -> drives GPIO6 low = ON
            - delay: 200ms
            - component.update: epd
            - delay: 2500ms                 # let the full refresh finish
            - output.turn_off: epd_power     # image retained; radio back in clean air

  # Green status LED driven off the gauge's OWN LiPo level (not the bike pack):
  #   >50% = solid   |   20-50% = slow blink (~1s)   |   <=20% = fast blink (~250ms)
  # Off-when-device-off is automatic (no power -> no LED). Driving GPIO3 does NOT touch
  # the e-paper power (GPIO6), so it has no effect on the BLE antenna.
  - interval: 250ms
    then:
      - lambda: |-
          id(led_tick)++;
          if (id(dev_off)) {                 // PWR button turned the gauge off -> LED dark
            id(green_led_pin).turn_off();
            return;
          }
          float bv = id(dev_batt_v).has_state() ? id(dev_batt_v).state : 0.0f;
          if (bv <= 1.0f) {                  // no real reading yet -> stay dark
            id(green_led_pin).turn_off();
            return;
          }
          int batt = (int)((bv - 3.30f) / 0.90f * 100.0f + 0.5f);
          if (batt < 0) batt = 0;
          if (batt > 100) batt = 100;
          bool lit;
          if (batt > 50) {
            lit = true;                              // solid
          } else if (batt > 20) {
            lit = ((id(led_tick) / 4) % 2) == 0;     // slow blink ~1s
          } else {
            lit = (id(led_tick) % 2) == 0;           // fast blink ~250ms
          }
          if (lit) id(green_led_pin).turn_on(); else id(green_led_pin).turn_off();

# ---------------- Side buttons ----------------
binary_sensor:
  # PWR button (GPIO18). Pressing it powers the gauge OFF by dropping the GPIO17 LiPo
  # latch. NOTE: this only actually powers down when running on the internal LiPo — if
  # the gauge is fed from bike/USB 5V, VSYS stays up and the press is a no-op. Power-ON
  # from the off state is hardware: press & hold PWR ~3s to re-latch power and boot.
  # The e-paper is left untouched so it keeps showing the last SOC as the "off" screen.
  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_pwr
    on_press:
      then:
        # Toggle the logical power state. Going OFF: kill the LED immediately, then drop
        # the GPIO17 latch (board powers down on LiPo; stays alive but logically-off with
        # the LED dark on USB/5V). Going back ON: clear the flag and the LED resumes.
        - lambda: |-
            id(dev_off) = !id(dev_off);
            if (id(dev_off)) id(green_led_pin).turn_off();
        - if:
            condition:
              lambda: 'return id(dev_off);'
            then:
              - lambda: 'gpio_hold_dis(GPIO_NUM_17);'   # release any pin-hold so the off takes
              - output.turn_off: vbat_power             # drop the latch -> powers off (LiPo)
              - output.turn_on: vbat_power              # only reached if still alive on USB/5V

  # BOOT button (GPIO0) = secondary button -> manual screen refresh. Replicates the 30s
  # interval's power-cycle so it stays BLE-antenna-safe (panel powered only during refresh).
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_refresh
    on_press:
      then:
        - output.turn_on: epd_power
        - delay: 200ms
        - component.update: epd
        - delay: 2500ms
        - output.turn_off: epd_power

# ---------------- Sensors we display ----------------
sensor:
  - platform: ant_bms_ble
    ant_bms_ble_id: bms0
    soc:
      name: "soc"
      id: pack_soc
    total_voltage:
      name: "voltage"
      id: pack_voltage
    current:
      name: "current"
      id: pack_current
    capacity_remaining:
      name: "ah_remaining"
      id: pack_ah
    temperature_1:
      name: "temp1"
      id: t1
    temperature_2:
      name: "temp2"
      id: t2
    temperature_3:
      name: "temp3"
      id: t3
    temperature_4:
      name: "temp4"
      id: t4

  # Gauge's OWN LiPo voltage via on-board ADC: GPIO4 (ADC1_CH3), 1:2 divider so we
  # multiply by 2. Used for the small device-battery % in the top-right corner.
  - platform: adc
    pin: GPIO4
    id: dev_batt_v
    attenuation: 12db
    update_interval: 10s   # fast enough that the LED blink-rate tracks the LiPo level
    internal: true
    filters:
      - multiply: 2.0

# ---------------- e-paper display ----------------
# Pin map verified against Waveshare's V2 factory source (epaper_config.h):
#   DC=10  CS=11  SCK=12  MOSI=13  RST=9  BUSY=8  PWR_EN=6 (active-low)
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO13

display:
  - platform: waveshare_epaper
    id: epd
    cs_pin: GPIO11
    dc_pin: GPIO10
    busy_pin: GPIO8
    reset_pin: GPIO9
    model: 1.54inv2     # 200x200 V2 panel (SSD1681); try "1.54in" if it misrenders
    rotation: 0
    update_interval: never   # driven by the interval above, only while connected
    lambda: |-
      // ---- worst-case pack temperature (max of the 4 sensors) ----
      float tmax = -1000.0f;
      if (id(t1).has_state() && id(t1).state > tmax) tmax = id(t1).state;
      if (id(t2).has_state() && id(t2).state > tmax) tmax = id(t2).state;
      if (id(t3).has_state() && id(t3).state > tmax) tmax = id(t3).state;
      if (id(t4).has_state() && id(t4).state > tmax) tmax = id(t4).state;
      bool have_temp = tmax > -999.0f;
      if (!have_temp) tmax = 0.0f;
      bool hot = have_temp && tmax >= ${hot_temp_c}.0f;

      // ---- estimated range from live Ah remaining (raw to empty) ----
      const float AH_PER_MI_MED  = ${range_ah_per_mi_med}f;   // ~40 mph cruise
      const float AH_PER_MI_HARD = ${range_ah_per_mi_hard}f;  // ~65 mph
      float ah = id(pack_ah).has_state() ? id(pack_ah).state : 0.0f;
      int mi_med  = (int)(ah / AH_PER_MI_MED  + 0.5f);
      int mi_hard = (int)(ah / AH_PER_MI_HARD + 0.5f);

      // ---- gauge's own battery %, small top-right corner ----
      // Approx 1S LiPo curve: 3.30 V = 0 %, 4.20 V = 100 % (rough but fine here).
      float bv = id(dev_batt_v).has_state() ? id(dev_batt_v).state : 0.0f;
      int batt = (int)((bv - 3.30f) / 0.90f * 100.0f + 0.5f);
      if (batt < 0) batt = 0;
      if (batt > 100) batt = 100;
      if (bv > 1.0f)   // only show once we have a real reading
        it.printf(199, 2, id(font_tiny), TextAlign::TOP_RIGHT, "%d%%", batt);

      // ---- big SOC number, top ----
      it.printf(100, 2, id(font_huge), TextAlign::TOP_CENTER, "%.0f%%",
                id(pack_soc).has_state() ? id(pack_soc).state : 0);

      // ---- max temperature, with HOT flag ----
      if (hot)
        it.printf(100, 66, id(font_mid), TextAlign::TOP_CENTER, "HOT %.0fC", tmax);
      else
        it.printf(100, 66, id(font_mid), TextAlign::TOP_CENTER, "%.0fC", tmax);

      // ---- voltage + current ----
      it.printf(100, 100, id(font_small), TextAlign::TOP_CENTER, "%.1fV  %.0fA",
                id(pack_voltage).has_state() ? id(pack_voltage).state : 0,
                id(pack_current).has_state() ? id(pack_current).state : 0);

      // ---- range: Medium (40) / Hard (65) miles to empty ----
      it.printf(100, 120, id(font_small), TextAlign::TOP_CENTER, "M%d  H%d mi",
                mi_med, mi_hard);

      // ---- SOC bar along the bottom ----
      int w = (int)((id(pack_soc).has_state() ? id(pack_soc).state : 0) / 100.0 * 196);
      it.rectangle(2, 176, 196, 18);
      it.filled_rectangle(2, 176, w, 18);

      // ---- thick full-screen border when overheating (glanceable warning) ----
      if (hot) {
        for (int i = 0; i < 5; i++)
          it.rectangle(i, i, 200 - 2 * i, 200 - 2 * i);
      }

font:
  - file: "gfonts://Roboto@900"
    id: font_huge
    size: 64
  - file: "gfonts://Roboto@700"
    id: font_mid
    size: 32
  - file: "gfonts://Roboto@500"
    id: font_small
    size: 18
  - file: "gfonts://Roboto@500"
    id: font_tiny
    size: 12
